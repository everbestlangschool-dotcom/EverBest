<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Everest: The Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f1c40f;
            --path: #e74c3c;
            --bg: #1a1a1a;
            --card: #2c3e50;
            --text: #ecf0f1;
            --forest: #27ae60;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
        }

        /* --- ЗАСТАВКА (HERO) С ТВОИМ ФОТО --- */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), 
                        url('trekking.png'); /* ТВОЕ ФОТО ТУТ */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 5px solid var(--accent);
        }

        .hero h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: 5px; margin: 0; }

        /* --- КАРТА (ТРЕКЕР) --- */
        .map-section {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(26, 26, 26, 0.95);
            padding: 15px;
            border-bottom: 2px solid var(--accent);
            text-align: center;
        }

        #tracker-svg {
            width: 100%;
            max-width: 900px;
            height: 100px;
            background: #222;
            border-radius: 10px;
            margin-top: 10px;
        }

        .altitude-display { font-size: 1.5rem; font-weight: bold; color: var(--accent); }

        /* --- СПИСОК УРОКОВ --- */
        .journey-container { max-width: 800px; margin: 30px auto; padding: 20px; }
        
        .step {
            background: var(--card);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #3e4f5f;
        }

        .step:hover { background: #34495e; transform: translateX(10px); }
        .step-info { flex: 1; }
        .meta-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); margin: 0; }
        .grammar-topic { font-style: italic; font-size: 0.85rem; color: #bdc3c7; }
        .alt-tag { background: #1a1a1a; padding: 5px 10px; border-radius: 5px; font-weight: bold; min-width: 70px; text-align: center; }

        /* --- ОКНО УРОКА --- */
        .lesson-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 200; display: none;
            overflow-y: auto; padding: 40px 20px;
        }
        .lesson-content { max-width: 800px; margin: 0 auto; }
        .video-placeholder { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; margin: 20px 0; }
        .btn-close { background: var(--accent); color: #000; padding: 12px 25px; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; }

        #climber { transition: all 1s ease-in-out; }
    </style>
</head>
<body>

<header class="hero">
    <h1>ENGLISH EVEREST</h1>
    <p>Твое восхождение начинается здесь.</p>
</header>

<div class="map-section">
    <div id="loc-name">📍 Катманду</div>
    <div class="altitude-display"><span id="alt-val">1450</span> m</div>
    <svg id="tracker-svg" viewBox="0 0 1000 100">
        <path d="M 50 80 L 150 80 L 250 50 L 350 30 L 450 30 L 950 80" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5"/>
        <text x="50" y="95" fill="white" font-size="12">KTM</text>
        <text x="350" y="20" fill="white" font-size="12">LUKLA</text>
        <text x="920" y="95" fill="white" font-size="12">PHAKDING</text>
        <g id="climber" transform="translate(50, 80)">
            <circle r="6" fill="var(--accent)" />
            <text y="-10" x="-10" font-size="20">🧗</text>
        </g>
    </svg>
</div>

<div class="journey-container" id="steps-list">
    </div>

<div id="lesson-overlay" class="lesson-overlay">
    <div class="lesson-content">
        <button class="btn-close" onclick="closeLesson()">← ВЕРНУТЬСЯ НА ТРОПУ</button>
        <h1 id="l-title" style="color: var(--accent);"></h1>
        <p id="l-grammar" style="font-style: italic; color: #bdc3c7;"></p>
        
        <h3>1. Теория (Видео объяснение)</h3>
        <div class="video-placeholder">
             <iframe id="l-video" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
        </div>

        <h3>2. Практика: Проверь себя</h3>
        <div id="l-practice" style="background: #222; padding: 20px; border-radius: 10px; border: 1px solid var(--accent);">
            </div>

        <h3>3. Что вынести с урока</h3>
        <div id="l-summary" style="border-left: 4px solid var(--forest); padding-left: 20px;">
            </div>
    </div>
</div>

<script>
    const lessonsData = [
        { id: 1, meta: "Приземление в Катманду", grammar: "Личные местоимения", alt: 1450, x: 50 },
        { id: 2, meta: "Посадка на рейс в Луклу", grammar: "Числительные (0-100)", alt: 1450, x: 150 },
        { id: 3, meta: "Перелет над облаками", grammar: "Порядок слов в предложении", alt: 2100, x: 250 },
        { id: 4, meta: "Приземление на краю скалы", grammar: "Глагол to be (Утверждение)", alt: 2860, x: 350 },
        { id: 5, meta: "Акклиматизация: первые шаги", grammar: "to be (Отрицание)", alt: 2850, x: 400 },
        { id: 6, meta: "Первый час в походе", grammar: "to be (Вопросы Yes/No)", alt: 2840, x: 450 },
        { id: 7, meta: "Духовная атмосфера тропы", grammar: "Притяжательные местоимения", alt: 2830, x: 500 },
        { id: 8, meta: "Встреча с караваном яков", grammar: "Множественное число существительных", alt: 2820, x: 550 },
        { id: 9, meta: "Разговор с гидом", grammar: "Вопросительные слова What/How + to be", alt: 2810, x: 600 },
        { id: 10, meta: "Указатели на тропе", grammar: "This / That", alt: 2800, x: 650 },
        { id: 11, meta: "Привал и горячий чай", grammar: "Пауза: Повторение", alt: 2790, x: 680 },
        { id: 12, meta: "С новыми силами", grammar: "Глаголы have, like, love, work", alt: 2780, x: 710 },
        { id: 13, meta: "Чьи это вещи?", grammar: "Possessive 's", alt: 2770, x: 740 },
        { id: 14, meta: "Тяжелый подъем", grammar: "Do vs Make", alt: 2760, x: 770 },
        { id: 15, meta: "Ритм движения", grammar: "Always / Sometimes / Never", alt: 2750, x: 800 },
        { id: 16, meta: "Встреча с альпинистами", grammar: "Yes/No Questions (Common verbs)", alt: 2740, x: 830 },
        { id: 17, meta: "Расспросы о маршруте", grammar: "Open Questions", alt: 2730, x: 860 },
        { id: 18, meta: "Где наш лагерь?", grammar: "Предлоги места", alt: 2720, x: 890 },
        { id: 19, meta: "Усталость — это нормально", grammar: "Фразовый глагол to be", alt: 2710, x: 920 },
        { id: 20, meta: "Цель близка", grammar: "Глагол Get", alt: 2700, x: 940 },
        { id: 21, meta: "Желания и потребности", grammar: "Want to / Need to / Like to", alt: 2690, x: 960 },
        { id: 22, meta: "Дыхание в такт", grammar: "3-е лицо ед.ч. (Окончание -s)", alt: 2680, x: 975 },
        { id: 23, meta: "Время ужина", grammar: "In, On, At (Время)", alt: 2670, x: 990 },
        { id: 24, meta: "Прибытие в Пхакдинг", grammar: "In, On, At (Место)", alt: 2610, x: 1000 }
    ];

    const list = document.getElementById('steps-list');

    lessonsData.forEach(l => {
        const item = document.createElement('div');
        item.className = 'step';
        item.onclick = () => openLesson(l);
        item.innerHTML = `
            <div class="step-info">
                <p class="meta-title">${l.id}. ${l.meta}</p>
                <span class="grammar-topic">${l.grammar}</span>
            </div>
            <div class="alt-tag">${l.alt}m</div>
        `;
        list.appendChild(item);
    });

    function openLesson(l) {
        // Движение человечка
        const yCoord = l.x < 350 ? 80 - (l.x/10) : 30 + (l.x-350)/12; 
        document.getElementById('climber').setAttribute('transform', `translate(${l.x}, ${yCoord})`);
        document.getElementById('alt-val').innerText = l.alt;
        document.getElementById('loc-name').innerText = `📍 ${l.meta}`;

        // Наполнение урока
        document.getElementById('l-title').innerText = l.meta;
        document.getElementById('l-grammar').innerText = `Тема: ${l.grammar}`;
        document.getElementById('lesson-overlay').style.display = 'block';
    }

    function closeLesson() {
        document.getElementById('lesson-overlay').style.display = 'none';
    }
</script>

</body>
</html>
