<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Everest: The Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f1c40f;
            --path: #e74c3c;
            --bg: #1a1a1a;
            --card: #2c3e50;
            --text: #ecf0f1;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* --- КАРТА С ТРЕКЕРОМ --- */
        .map-section {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(26, 26, 26, 0.9);
            padding: 10px;
            border-bottom: 2px solid var(--accent);
            text-align: center;
        }

        #tracker-svg {
            width: 100%;
            max-width: 800px;
            height: 150px;
            background: #222;
            border-radius: 10px;
            margin-top: 10px;
        }

        .altitude-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent);
        }

        /* --- СПИСОК УРОКОВ --- */
        .journey-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }

        .step {
            background: var(--card);
            margin-bottom: 20px;
            padding: 20px;
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
            border-left: 5px solid transparent;
        }

        .step:hover { transform: scale(1.02); background: #34495e; }
        .step.active { border-left-color: var(--accent); box-shadow: 0 0 15px rgba(241, 196, 15, 0.3); }

        .meta-title { font-size: 1.3rem; font-weight: 700; margin: 0; color: var(--accent); }
        .grammar-topic { font-style: italic; font-size: 0.9rem; color: #bdc3c7; display: block; margin-top: 5px; }
        .altitude-label { position: absolute; right: 20px; top: 20px; font-weight: bold; opacity: 0.6; }

        /* --- МОДАЛЬНОЕ ОКНО УРОКА --- */
        .lesson-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200; display: none;
            overflow-y: auto; padding: 40px 20px;
        }
        .lesson-content { max-width: 700px; margin: 0 auto; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; margin: 20px 0; border-radius: 10px; }
        .btn-close { background: var(--accent); color: #000; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Анимация человечка */
        #climber { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

<div class="map-section">
    <div>Текущая локация: <span id="loc-name" style="color:white">Катманду</span></div>
    <div class="altitude-display"><span id="alt-val">1450</span> m</div>
    
    <svg id="tracker-svg" viewBox="0 0 800 150">
        <path id="route" d="M 50 120 L 150 120 L 250 80 L 350 40 L 450 40 L 550 50 L 650 60 L 750 70" 
              fill="none" stroke="#e74c3c" stroke-width="3" stroke-dasharray="10"/>
        
        <g id="climber" transform="translate(50, 120)">
            <circle r="8" fill="#f1c40f" />
            <text y="-15" x="-5" font-size="20">🧗</text>
        </g>
        
        <text x="40" y="140" fill="white" font-size="10">Катманду</text>
        <text x="340" y="30" fill="white" font-size="10">Лукла (2860m)</text>
        <text x="730" y="90" fill="white" font-size="10">Пхакдинг</text>
    </svg>
</div>

<div class="journey-container" id="steps-list">
    </div>

<div id="lesson-overlay" class="lesson-overlay">
    <div class="lesson-content">
        <button class="btn-close" onclick="closeLesson()">← Назад к маршруту</button>
        <h1 id="lesson-title">Название</h1>
        <div class="video-box">
             <iframe id="video-frame" width="100%" height="100%" src="" frameborder="0" allowfullscreen></iframe>
        </div>
        <h3>Практика:</h3>
        <div id="exercise-area" style="background:#333; padding:20px; border-radius:10px;">
            </div>
        <h3>Важно запомнить:</h3>
        <ul id="summary-list"></ul>
    </div>
</div>

<script>
    const lessons = [
        { id: 1, meta: "Приземление в Катманду", grammar: "Личные местоимения", alt: 1450, x: 50, y: 120, desc: "Вы в столице Непала. Готовим документы." },
        { id: 2, meta: "Посадка на рейс в Луклу", grammar: "Числительные (0-100)", alt: 1450, x: 150, y: 120, desc: "Проверка веса багажа и номера выхода." },
        { id: 3, meta: "Перелет над облаками", grammar: "Порядок слов в предложении", alt: 2100, x: 250, y: 80, desc: "30 минут экстрима в маленьком самолете." },
        { id: 4, meta: "Приземление на краю бездны", grammar: "Глагол To Be: Утверждение", alt: 2860, x: 350, y: 40, desc: "Самый опасный аэропорт мира. Вы в Лукле!" },
        { id: 5, meta: "Старт: Проверка снаряжения", grammar: "To Be: Отрицание", alt: 2860, x: 450, y: 40, desc: "Флажок старт. Мы не боимся трудностей." },
        { id: 6, meta: "Акклиматизационный шаг", grammar: "To Be: Вопросы (Yes/No)", alt: 2850, x: 550, y: 50, desc: "Первый спуск к реке Дудх-Коши." },
        { id: 7, meta: "Первый час в походе", grammar: "Притяжательные местоимения", alt: 2840, x: 600, y: 55, desc: "Чей это рюкзак? Мой!" },
        { id: 8, meta: "Вдоль молитвенных барабанов", grammar: "Множественное число существительных", alt: 2830, x: 650, y: 60, desc: "Вокруг много храмов и камней мани." },
        // ... и так далее до 24
    ];

    const listContainer = document.getElementById('steps-list');

    lessons.forEach(lesson => {
        const div = document.createElement('div');
        div.className = 'step';
        div.onclick = () => openLesson(lesson);
        div.innerHTML = `
            <span class="altitude-label">${lesson.alt}m</span>
            <p class="meta-title">${lesson.id}. ${lesson.meta}</p>
            <span class="grammar-topic">${lesson.grammar}</span>
        `;
        listContainer.appendChild(div);
    });

    function openLesson(lesson) {
        // Двигаем человечка
        const climber = document.getElementById('climber');
        climber.setAttribute('transform', `translate(${lesson.x}, ${lesson.y})`);
        
        // Обновляем текст в шапке
        document.getElementById('alt-val').innerText = lesson.alt;
        document.getElementById('loc-name').innerText = lesson.meta;

        // Открываем контент (здесь можно менять видео под каждый урок)
        document.getElementById('lesson-title').innerText = lesson.meta;
        document.getElementById('lesson-overlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeLesson() {
        document.getElementById('lesson-overlay').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
