<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Everest: The Journey</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f1c40f;
            --path: #e74c3c;
            --bg: #1a1a1a;
            --card: #2c3e50;
            --text: #ecf0f1;
            --forest: #27ae60;
        }

        body { font-family: 'Montserrat', sans-serif; margin: 0; background-color: var(--bg); color: var(--text); }

        .hero {
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('trekking.png');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; border-bottom: 5px solid var(--accent);
        }

        .map-section {
            position: sticky; top: 0; z-index: 100; background: rgba(26, 26, 26, 0.95);
            padding: 15px; border-bottom: 2px solid var(--accent); text-align: center;
        }
        #tracker-svg { width: 100%; max-width: 900px; height: 100px; background: #222; border-radius: 10px; margin-top: 10px; }
        .altitude-display { font-size: 1.5rem; font-weight: bold; color: var(--accent); }

        .journey-container { max-width: 800px; margin: 30px auto; padding: 20px; }
        .step {
            background: var(--card); margin-bottom: 15px; padding: 20px; border-radius: 12px;
            cursor: pointer; transition: 0.3s; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3e4f5f;
        }
        .step:hover { background: #34495e; transform: translateX(10px); }
        .meta-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); margin: 0; }
        .en-title { font-size: 0.75rem; color: #bdc3c7; font-weight: 400; display: block; }
        .grammar-topic { font-style: italic; font-size: 0.85rem; color: #bdc3c7; }
        .alt-tag { background: #1a1a1a; padding: 5px 10px; border-radius: 5px; font-weight: bold; min-width: 70px; text-align: center; }

        .lesson-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 200; display: none; overflow-y: auto; padding: 20px;
        }
        .lesson-content { max-width: 750px; margin: 0 auto; padding-bottom: 50px; }
        .lesson-img { width: 100%; border-radius: 10px; margin-bottom: 15px; border: 2px solid var(--accent); }
        .btn-close { background: var(--accent); color: #000; padding: 10px 20px; border: none; border-radius: 5px; font-weight: 900; cursor: pointer; margin-bottom: 20px; }
        
        #climber { transition: all 1s ease-in-out; }
        .plane-icon { font-size: 16px; }
    </style>
</head>
<body>

<header class="hero">
    <h1>ENGLISH EVEREST</h1>
    <p>Твое восхождение начинается здесь.</p>
</header>

<div class="map-section">
    <div id="loc-name">📍 Катманду</div>
    <div class="altitude-display"><span id="alt-val">1450</span> m</div>
    <svg id="tracker-svg" viewBox="0 0 1000 100">
        <path d="M 50 80 L 350 30 L 950 80" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5"/>
        <g id="climber" transform="translate(50, 80)">
            <circle r="6" fill="var(--accent)" />
            <text y="-10" x="-10" font-size="20">🧗</text>
        </g>
    </svg>
</div>

<div class="journey-container" id="steps-list"></div>

<div id="lesson-overlay" class="lesson-overlay">
    <div class="lesson-content" id="lesson-inner-content"></div>
</div>

<script>
    const lessonsData = [
        { id: 1, meta: "Приземление в Катманду", en: "(Landing in Kathmandu)", grammar: "Personal Pronouns", alt: 1450, x: 50, img: "kathmandu.png", 
          desc: "Вы прибыли в аэропорт Катманду. Здесь и сейчас начинается ваше восхождение на Саммит. Удачи.", 
          en_desc: "You have arrived at Kathmandu airport. Your ascent to the Summit begins here and now. Good luck." },
        
        { id: 2, meta: "Посадка на рейс в Луклу", en: "(Boarding the flight to Lukla)", grammar: "Cardinals (0-100)", alt: 1450, x: 150, img: "bording the flight to Lukla.png",
          desc: "Благодаря лайфхакам сэкономим много сил и совершим перелет к следующему пункту назначения.",
          en_desc: "Thanks to these hacks, we will save a lot of energy and fly to the next destination." },
        
        { id: 3, meta: "Перелет над облаками", en: "(Flight above the clouds)", grammar: "Word Order", alt: "✈️", x: 250, img: "flight above the clouds.png",
          desc: "Сверху лучше видна перспектива. Во время полета из иллюминатора увидим весь предстоящий маршрут (overview).",
          en_desc: "The perspective is clearer from above. During the flight, we will see the entire upcoming route (overview) from the window." },
        
        { id: 4, meta: "Приземление на краю скалы", en: "(Landing on the edge of a cliff)", grammar: "to be (Affirmative)", alt: 2860, x: 350, img: "landing on the edge of a cliff.png",
          desc: "Приземлись в одном из самых опасных аэропортов на краю обрывистой скалы. Отсюда начитанется твое восхождение. Путь потребует усилий, но при этом подарить незабываемый опыт и навсегда изменит тебя.",
          en_desc: "Land at one of the most dangerous airports on the edge of a steep cliff. Your ascent begins here. The journey will require effort, but it will provide an unforgettable experience and change you forever." },
        
        { id: 5, meta: "Акклиматизация: первые шаги", en: "(Acclimatization: first steps)", grammar: "to be (Negative)", alt: 2850, x: 400, img: "acclimatization first steps.jpg",
          desc: "В первые дни похода очень важно не торопиться и уделить время акклиматизации. Это залог успешного покорения заветной вершины.",
          en_desc: "In the first days of the trek, it is very important not to rush and take time for acclimatization. This is the key to successfully conquering the coveted summit." },
        
        { id: 6, meta: "Ворота в Непал", en: "(Gate to Nepal)", grammar: "to be (Yes/No Questions)", alt: 2840, x: 450, img: "gate in nepal.png",
          desc: "Несколько уточняющих вопросов перед тем как покинуть город и окончательно выйти на тропу.",
          en_desc: "A few clarifying questions before leaving the city and finally hitting the trail." },
        
        { id: 7, meta: "Первая деревня на маршруте", en: "(Cheplung Village)", grammar: "Possessive Adjectives", alt: 2830, x: 500, img: "cheplung village.jpg",
          desc: "Кому принадлежат дома в деревне? Чьи это вещи?",
          en_desc: "Who do the houses in the village belong to? Whose things are these?" },
        
        { id: 8, meta: "Встреча с караваном яков", en: "(Meeting a yak caravan)", grammar: "Plural Nouns", alt: 2820, x: 550, img: "meeting with yak caravan.png",
          desc: "Сколько комплектов вещей ты взял с собой в рюкзак?",
          en_desc: "How many sets of things did you pack in your backpack?" },
        
        { id: 9, meta: "Первый мост на маршруте", en: "(Bridge Suspension)", grammar: "What / How + to be", alt: 2810, x: 600, img: "suspension bridge.png",
          desc: "Кто построил этот мост?",
          en_desc: "Who built this bridge?" },
        // ... остальные уроки 10-30
    ];

    // Добавляем остальные уроки (10-30) без изменений, как в прошлом коде
    const extraLessons = [
        { id: 10, meta: "Указатели на тропе", en: "(Trail markers)", grammar: "This / That", alt: 2800, x: 650 },
        { id: 11, meta: "Привал и горячий чай", en: "(Break and hot tea)", grammar: "Review", alt: 2790, x: 680 },
        { id: 12, meta: "С новыми силами", en: "(With new strength)", grammar: "have, like, love, work", alt: 2780, x: 710 },
        { id: 13, meta: "Чьи это вещи?", en: "(Whose things are these?)", grammar: "Possessive 's", alt: 2770, x: 740 },
        { id: 14, meta: "Идем вдоль реки", en: "(Walking along the river)", grammar: "Do vs Make", alt: 2760, x: 770 },
        { id: 15, meta: "Ритм движения", en: "(Rhythm of movement)", grammar: "Always / Sometimes / Never", alt: 2750, x: 800 },
        { id: 16, meta: "Встреча с альпинистами", en: "(Meeting the climbers)", grammar: "Yes/No Questions (Common verbs)", alt: 2740, x: 830 },
        { id: 17, meta: "Расспросы о маршруте", en: "(Asking about the route)", grammar: "Open Questions", alt: 2730, x: 860 },
        { id: 18, meta: "Где наш лагерь?", en: "(Where is our camp?)", grammar: "Prepositions of Place", alt: 2720, x: 890 },
        { id: 19, meta: "Усталость — это нормально", en: "(Being tired is normal)", grammar: "Phrasal Verb to be", alt: 2710, x: 920 },
        { id: 20, meta: "Цель близка", en: "(Goal is near)", grammar: "Verb Get", alt: 2700, x: 940 },
        { id: 21, meta: "Желания и потребности", en: "(Wants and needs)", grammar: "Want to / Need to / Like to", alt: 2690, x: 960 },
        { id: 22, meta: "Дыхание в такт", en: "(Breathing in rhythm)", grammar: "3rd Person -s", alt: 2680, x: 975 },
        { id: 23, meta: "Время ужина", en: "(Dinner time)", grammar: "In, On, At (Time)", alt: 2670, x: 985 },
        { id: 24, meta: "Сверяем карту", en: "(Checking the map)", grammar: "In, On, At (Place)", alt: 2660, x: 1000 },
        { id: 25, meta: "Смогу ли я дойти?", en: "(Can I reach it?)", grammar: "Can (Affirmative)", alt: 2650, x: 980 },
        { id: 26, meta: "Не могу представить", en: "(I can't imagine)", grammar: "Can (Negative)", alt: 2640, x: 960 },
        { id: 27, meta: "А что я еще смогу?", en: "(What else can I do?)", grammar: "Can (Questions)", alt: 2630, x: 940 },
        { id: 28, meta: "Разве мы уже не пришли?", en: "(Haven't we arrived yet?)", grammar: "Negative Questions", alt: 2620, x: 920 },
        { id: 29, meta: "Прибытие в Пхакдинг. Ночной привал", en: "(Arrival in Phakding. Night camp)", grammar: "Isn't there...? Aren't there...?", alt: 2610, x: 900 },
        { id: 30, meta: "Утренний подъем. Вспоминаем первый день", en: "(Morning rise. Recalling day one)", grammar: "Final Review", alt: 2600, x: 880 }
    ];

    const allLessons = [...lessonsData, ...extraLessons];
    const list = document.getElementById('steps-list');
    
    allLessons.forEach(l => {
        const item = document.createElement('div');
        item.className = 'step';
        item.onclick = () => openLesson(l);
        item.innerHTML = `
            <div class="step-info">
                <p class="meta-title">${l.id}. ${l.meta} <span class="en-title">${l.en}</span></p>
                <span class="grammar-topic">${l.grammar}</span>
            </div>
            <div class="alt-tag">${l.alt}${typeof l.alt === 'number' ? 'm' : ''}</div>
        `;
        list.appendChild(item);
    });

    function openLesson(l) {
        // Логика движения по карте
        const xVal = l.x;
        const yCoord = xVal < 350 ? 80 - (xVal/7) : 30 + (xVal-350)/12; 
        document.getElementById('climber').setAttribute('transform', `translate(${xVal}, ${yCoord})`);
        document.getElementById('alt-val').innerText = typeof l.alt === 'number' ? l.alt : "---";
        document.getElementById('loc-name').innerText = `📍 ${l.meta}`;

        const inner = document.getElementById('lesson-inner-content');
        
        // Генерация контента урока
        let contentHtml = `<button class="btn-close" onclick="closeLesson()">← НАЗАД</button>
                           <h1 style="color:var(--accent)">${l.meta}</h1>
                           <p style="font-size:0.8rem; color:#bdc3c7; margin-top:-10px;">${l.en}</p>`;
        
        if (l.img) {
            contentHtml += `<img src="${l.img}" class="lesson-img">`;
        }

        if (l.desc) {
            contentHtml += `<p style="line-height:1.4"><i>${l.desc}</i></p>
                            <p style="color:#bdc3c7; font-size:0.9rem;"><i>${l.en_desc}</i></p>`;
        }

        contentHtml += `<div style="background:#222; padding:20px; border-radius:10px; margin-top:20px;">
                            <h3>Теория</h3><p>Раздел в разработке...</p>
                        </div>`;

        inner.innerHTML = contentHtml;
        document.getElementById('lesson-overlay').style.display = 'block';
    }

    function closeLesson() { document.getElementById('lesson-overlay').style.display = 'none'; }
</script>

</body>
</html>
